{% extends "base.html" %}

{% block title %}Create Post{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6">
    <h2 class="text-2xl font-bold mb-6">Create New Post</h2>
    
    <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"></div>
    
    <form id="create-post-form">
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="title">
                Title
            </label>
            <input type="text" id="title" name="title" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="status">
                Status
            </label>
            <select id="status" name="status"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>
        
        <div class="mb-6">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="content">
                Content
            </label>
            <textarea id="content" name="content" rows="8" required
                      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        
        <div class="flex space-x-4">
            <button type="submit" 
                    class="bg-blue-500 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-600 transition duration-300">
                Create Post
            </button>
            <a href="/ui/dashboard" 
               class="bg-gray-500 text-white font-bold py-2 px-4 rounded-md hover:bg-gray-600 transition duration-300 text-center">
                Cancel
            </a>
        </div>
    </form>
</div>

<script>
    document.getElementById('create-post-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const token = document.cookie.split('; ').find(row => row.startsWith('access_token='));
        
        if (!token) {
            window.location.href = '/ui/login';
            return;
        }
        
        const formData = new URLSearchParams();
        formData.append('title', document.getElementById('title').value);
        formData.append('status', document.getElementById('status').value);
        formData.append('content', document.getElementById('content').value);
        
        try {
            const response = await fetch('/api/posts/create-post', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Authorization': `Bearer ${token.split('=')[1]}`
                },
                body: formData
            });
            
            if (response.ok) {
                window.location.href = '/ui/dashboard';
            } else {
                const error = await response.json();
                showError(error.detail || 'Failed to create post');
            }
        } catch (error) {
            showError('Network error. Please try again.');
        }
    });
    
    function showError(message) {
        const errorDiv = document.getElementById('error-message');
        errorDiv.textContent = message;
        errorDiv.classList.remove('hidden');
        setTimeout(() => {
            errorDiv.classList.add('hidden');
        }, 5000);
    }
</script>
{% endblock %}
