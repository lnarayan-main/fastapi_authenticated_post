{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-md p-6">
    <h2 class="text-2xl font-bold mb-4">My Posts</h2>
    
    <div id="posts-list" class="space-y-4">
        <div class="text-center py-8">Loading posts...</div>
    </div>
</div>

<script>
    async function loadPosts() {
        const token = document.cookie.split('; ').find(row => row.startsWith('access_token='));
        
        if (!token) {
            window.location.href = '/ui/login';
            return;
        }
        
        try {
            const response = await fetch('/api/posts/get-posts', {
                headers: {
                    'Authorization': `Bearer ${token.split('=')[1]}`
                }
            });
            
            if (response.ok) {
                const posts = await response.json();
                displayPosts(posts);
            } else if (response.status === 401) {
                document.cookie = 'access_token=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
                window.location.href = '/ui/login';
            } else {
                showError('Failed to load posts');
            }
        } catch (error) {
            console.error('Error loading posts:', error);
            showError('Network error');
        }
    }
    
    function displayPosts(posts) {
        const container = document.getElementById('posts-list');
        
        if (posts.length === 0) {
            container.innerHTML = '<div class="text-center py-8 text-gray-500">No posts yet. Create your first post!</div>';
            return;
        }
        
        container.innerHTML = posts.map(post => `
            <div class="border rounded-lg p-4 hover:shadow-lg transition">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <h3 class="text-xl font-semibold mb-2">${escapeHtml(post.title)}</h3>
                        <p class="text-gray-600 mb-2">${escapeHtml(post.content.substring(0, 200))}...</p>
                        <div class="text-sm text-gray-500">
                            Status: <span class="font-medium">${post.status}</span>
                        </div>
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="editPost(${post.id})" 
                                class="bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600">
                            Edit
                        </button>
                        <button onclick="deletePost(${post.id})" 
                                class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">
                            Delete
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    async function deletePost(postId) {
        if (!confirm('Are you sure you want to delete this post?')) return;
        
        const token = document.cookie.split('; ').find(row => row.startsWith('access_token='));
        
        try {
            const response = await fetch(`/api/posts/delete-post/${postId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${token.split('=')[1]}`
                }
            });
            
            if (response.ok) {
                loadPosts(); // Reload posts
            } else {
                const error = await response.json();
                alert(error.detail || 'Failed to delete post');
            }
        } catch (error) {
            console.error('Error deleting post:', error);
            alert('Network error');
        }
    }
    
    function editPost(postId) {
        window.location.href = `/ui/edit-post/${postId}`;
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function showError(message) {
        const container = document.getElementById('posts-list');
        container.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded">${message}</div>`;
    }
    
    // Load posts on page load
    loadPosts();
</script>
{% endblock %}
