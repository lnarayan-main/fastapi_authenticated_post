<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PostApp{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #0d6efd; border: none; }
    </style>
</head>
<body>

<div class="container auth-container">
    <div class="col-md-6 col-lg-5 col-xl-4">
        <div class="card p-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">PostApp</h2>
                <p class="text-muted">{% block subtitle %}{% endblock %}</p>
            </div>

            {% block content %}{% endblock %}
            
            <div class="text-center mt-4">
                {% block footer %}{% endblock %}
            </div>
        </div>
    </div>
</div>

{% block scripts %}{% endblock %}
</body>
</html>
