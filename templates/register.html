{% extends "auth_base.html" %}

{% block title %}Register | PostApp{% endblock %}

{% block subtitle %}Create your account to start posting{% endblock %}

{% block content %}
<div id="error-message" class="alert alert-danger d-none" role="alert"></div>
<div id="success-message" class="alert alert-success d-none" role="alert"></div>
<form id="register-form">
    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" id="full_name" class="form-control form-control-lg" placeholder="Enter name" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control form-control-lg" placeholder="Enter email" required autocomplete="off">
    </div>
    
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control form-control-lg" placeholder="password" required autocomplete="new-password">
    </div>

    <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm_password" class="form-control form-control-lg" placeholder="confirm password" required autocomplete="new-password">
    </div>
    
    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm mt-3">Create Account</button>
</form>
{% endblock %}

{% block footer %}
<p class="mb-0 text-muted">Already have an account? <a href="/ui/login" class="text-decoration-none fw-bold">Login here</a></p>
{% endblock %}

{% block scripts %}
<script>

    const validateForm = (data) => {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(data.email)) {
            return "Please enter a valid email address.";
        }

        if (!data.full_name.trim().includes(' ')) {
            return "Please enter your full name (First and Last).";
        }

        if (data.password.length < 8) {
            return "Password must be at least 8 characters long.";
        }

        if (data.password !== data.confirm_password) {
            return "Passwords do not match!";
        }

        return null; 
    };

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const userData = {
            email: document.getElementById('email').value,
            full_name: document.getElementById('full_name').value,
            password: document.getElementById('password').value,
            confirm_password: document.getElementById("confirm_password").value
        };

        const validationError = validateForm(userData);
        if (validationError) {
            showMessage(validationError);
            return;
        }
        
        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });
            
            if (response.ok) {
                showMessage('Registration successful! Please login.', false);
                window.location.href = '/ui/login';
            } else {
                const error = await response.json();
                showMessage(error.detail || 'Registration failed');
            }
        } catch (error) {
            showMessage('Network error: ' + error.message);
        }
    });

    function showMessage(message, error=true) {
        let msgDiv = null;
        if(error){
            msgDiv = document.getElementById('error-message');
        }else {
            msgDiv = document.getElementById('success-message');
        }
    
        msgDiv.textContent = message;
        msgDiv.classList.remove('d-none');
        
        window.scrollTo({ top: 0, behavior: 'smooth' });

        setTimeout(() => {
            msgDiv.classList.add('d-none');
        }, 5000);
    }
</script>
{% endblock %}
