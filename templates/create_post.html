{% extends "base.html" %}

{% block title %}Create Post | PostApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="mb-3">
            <a href="/ui/dashboard" class="text-decoration-none text-muted small">← Back to Dashboard</a>
        </div>

        <div class="card shadow-sm border-0 p-4">
            <h2 class="fw-bold mb-4">Create a New Post</h2>
            
            <form id="post-form">
                <div class="mb-3">
                    <label class="form-label fw-bold">Post Title</label>
                    <input type="text" id="title" class="form-control" placeholder="Enter a catchy title" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Status</label>
                    <select id="status" class="form-select">
                        <option value="Active">Active</option>
                        <option value="Draft">Draft</option>
                        <option value="Private">Private</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Content</label>
                    <textarea id="content" class="form-control" rows="6" placeholder="What's on your mind?" required></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm">Publish Post</button>
                    <a href="/ui/dashboard" class="btn btn-link text-muted">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const token = localStorage.getItem('token');
    
    // Safety check: redirect if no token
    if (!token) {
        window.location.href = '/ui/login';
    }

    document.getElementById('post-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData();
        formData.append('title', document.getElementById('title').value);
        formData.append('status', document.getElementById('status').value);
        formData.append('content', document.getElementById('content').value);

        try {
            const response = await fetch('/api/posts/create-post', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`
                    // Browser handles multipart/form-data boundary automatically
                },
                body: formData
            });

            if (response.ok) {
                alert('Post created successfully!');
                window.location.href = '/ui/dashboard';
            } else {
                const error = await response.json();
                alert('Error: ' + (error.detail || 'Failed to create post'));
            }
        } catch (err) {
            alert('Network error: ' + err.message);
        }
    });
</script>
{% endblock %}
